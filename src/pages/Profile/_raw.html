<style>
        body { font-family: 'Manrope', sans-serif; -webkit-font-smoothing: antialiased; }
        .glass-card { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .profile-gradient { background: linear-gradient(135deg, #E101FF 0%, #870199 100%); }
    </style>
</head>
<body class="bg-surface text-on-surface pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md border-b border-outline-variant/20 shadow-sm flex items-center justify-between px-container-padding h-16">
<div class="flex items-center gap-unit">

<h1 class="font-h1 text-h1 bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">내 정보</h1>
</div>
<button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="mt-20 px-container-padding flex flex-col gap-section-gap">

<section class="profile-gradient rounded-xl p-container-padding text-white shadow-[0px_4px_20px_0px_rgba(0,0,0,0.04)]">

<div class="absolute bottom-0 right-0 bg-white text-primary w-6 h-6 rounded-full flex items-center justify-center border-2 border-primary-container">
<span class="material-symbols-outlined text-[14px]" data-icon="edit" data-weight="fill" style="font-variation-settings: 'FILL' 1;">edit</span>
</div>
</div>
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="font-h2 text-h2">홍길동</span>
<span class="bg-white/20 px-2 py-0.5 rounded-full font-label-sm text-label-sm border border-white/30">참가자</span>
</div>
<p class="font-body-md text-white/80">2024.01 가입</p>
</div>
</div>
<!-- Stats -->
<div class="grid grid-cols-2 gap-stack-gap">
<div class="bg-white/10 glass-card rounded-lg p-3 text-center border border-white/10">
<p class="font-h2 text-h2">12</p>
<p class="font-label-sm text-label-sm text-white/70">참여한 행사</p>
</div>
<div class="bg-white/10 glass-card rounded-lg p-3 text-center border border-white/10">
<p class="font-h2 text-h2">3</p>
<p class="font-label-sm text-label-sm text-white/70">예정된 행사</p>
</div>
</div>
</section>
<!-- Contact Info Section -->
<section class="bg-surface-container-lowest rounded-xl p-container-padding shadow-[0px_4px_20px_0px_rgba(0,0,0,0.04)] flex flex-col gap-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="mail">mail</span>
</div>
<div class="flex flex-col">
<p class="font-label-sm text-label-sm text-on-surface-variant">이메일</p>
<p class="font-body-lg text-body-lg">hong@example.com</p>
</div>
</div>
<div class="h-px bg-outline-variant/30 w-full"></div>
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-tertiary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary" data-icon="call">call</span>
</div>
<div class="flex flex-col">
<p class="font-label-sm text-label-sm text-on-surface-variant">휴대폰 번호</p>

</div>
</div>
</section>
<!-- Menu List -->

<!-- Menu Item -->
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container transition-colors group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="help">help</span>
<span class="font-body-lg text-body-lg">도움말</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<div class="mx-4 h-px bg-outline-variant/10"></div>
<!-- Menu Item -->
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container transition-colors group">

<span class="material-symbols-outlined text-on-surface-variant" data-icon="info">info</span>

</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<!-- Logout Section -->
<section class="mt-4 mb-8">
<button class="w-full py-4 px-container-padding flex items-center justify-center gap-2 text-error font-body-lg hover:bg-error-container/10 transition-colors rounded-xl border border-error/20">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
                로그아웃
            </button>
</section>

<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface/90 backdrop-blur-xl border-t border-outline-variant/30 shadow-[0px_-4px_20px_0px_rgba(0,0,0,0.04)] flex justify-around items-center h-20 pb-safe px-unit">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-primary/5 rounded-full w-16 h-16 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</a>

<span class="material-symbols-outlined" data-icon="groups">groups</span>

</a>

<span class="font-label-sm text-label-sm">My Page</span>
</a>
</nav>
