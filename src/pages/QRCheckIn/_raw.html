<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e5e2e1",
                        "secondary-fixed": "#ffd6fc",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "surface-container": "#f0eded",
                        "secondary": "#9b24ac",
                        "on-surface": "#1b1b1c",
                        "inverse-on-surface": "#f3f0ef",
                        "on-primary-fixed": "#36003e",
                        "on-secondary-container": "#6d007c",
                        "tertiary-fixed": "#e0e0ff",
                        "surface-container-highest": "#e5e2e1",
                        "on-tertiary-fixed": "#000569",
                        "on-secondary-fixed-variant": "#7c008d",
                        "on-tertiary-fixed-variant": "#222fc2",
                        "background": "#fcf9f8",
                        "tertiary-container": "#5764f1",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f6f3f2",
                        "outline-variant": "#d9bfd5",
                        "on-primary-container": "#fffbff",
                        "on-tertiary-container": "#fffbff",
                        "error": "#ba1a1a",
                        "surface-dim": "#dcd9d9",
                        "primary-container": "#c700e2",
                        "on-secondary-fixed": "#36003e",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed-dim": "#fbaaff",
                        "on-surface-variant": "#544153",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "outline": "#867085",
                        "on-primary-fixed-variant": "#7c008d",
                        "tertiary-fixed-dim": "#bec2ff",
                        "tertiary": "#3c49d7",
                        "primary": "#9f00b4",
                        "on-error": "#ffffff",
                        "primary-fixed": "#ffd6fc",
                        "secondary-fixed-dim": "#fcaaff",
                        "surface-bright": "#fcf9f8",
                        "surface": "#fcf9f8",
                        "on-background": "#1b1b1c",
                        "secondary-container": "#f278fe",
                        "inverse-surface": "#303030",
                        "surface-container-high": "#eae7e7",
                        "surface-tint": "#a300b9",
                        "inverse-primary": "#fbaaff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "container-padding": "20px",
                        "stack-gap": "12px",
                        "section-gap": "24px",
                        "grid-gutter": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Manrope"],
                        "h2": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "label-sm": ["Manrope"],
                        "h1": ["Manrope"]
                    },
                    "fontSize": {
                        "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400"}],
                        "h2": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0", "fontWeight": "500"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanner-corner {
            width: 40px;
            height: 40px;
            border-color: #9f00b4; /* Primary color from config */
            border-width: 4px;
            position: absolute;
        }
        .corner-tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; border-top-left-radius: 16px; }
        .corner-tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; border-top-right-radius: 16px; }
        .corner-bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; border-bottom-left-radius: 16px; }
        .corner-br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; border-bottom-right-radius: 16px; }
        
        .scanner-overlay {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body class="text-on-background font-body-md min-h-screen relative overflow-hidden bg-black"><video autoplay="" class="fixed inset-0 w-full h-full object-cover z-0" id="video" playsinline=""></video>
<!-- Camera Preview Background -->
<!-- UI Overlay Layer -->
<div class="relative z-10 flex flex-col h-screen">
<!-- TopAppBar (From JSON Template) -->
<header class="flex items-center px-container-padding h-14 w-full bg-transparent text-white fixed top-0 left-0 right-0 z-20">
<button class="mr-4 active:opacity-70 transition-opacity p-2 -ml-2 rounded-full hover:bg-white/10">
<span class="material-symbols-outlined text-[28px]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-h2 text-h2">QR 스캔</h1>
</header>
<!-- Main Scanner Canvas -->
<main class="flex-grow flex flex-col items-center justify-center p-container-padding">
<!-- Scanning Area -->
<div class="relative w-full max-w-[280px] aspect-square mb-section-gap">
<!-- Viewfinder Mask (CSS managed) -->
<div class="absolute inset-0 rounded-2xl border-2 border-white/20"></div>
<!-- Corner Indicators (Vivid Precision Style) -->
<div class="scanner-corner corner-tl"></div>
<div class="scanner-corner corner-tr"></div>
<div class="scanner-corner corner-bl"></div>
<div class="scanner-corner corner-br"></div>
<!-- Scanning Line Animation (Static representation) -->
<div class="absolute top-1/2 left-4 right-4 h-[2px] bg-primary shadow-[0_0_15px_rgba(159,0,180,0.8)] opacity-70"></div>
</div>
<!-- Instruction Text -->
<div class="bg-black/40 backdrop-blur-md px-6 py-3 rounded-full">
<p class="text-white font-body-lg text-body-lg text-center">
                    QR 코드를 사각형 안에 맞춰주세요
                </p>
</div>
</main>
<!-- Bottom Actions Section -->
<footer class="pb-12 flex flex-col items-center gap-stack-gap">
<!-- Flashlight FAB -->
<button class="w-16 h-16 rounded-full bg-white/20 backdrop-blur-xl border border-white/30 flex items-center justify-center text-white shadow-lg active:scale-95 transition-transform hover:bg-white/30">
<span class="material-symbols-outlined text-[32px]" data-icon="flashlight_on">flashlight_on</span>
</button>
<p class="text-white/60 font-label-sm text-label-sm">손전등 켜기</p>
</footer>
<!-- Bottom Navigation (Filtered: Suppressed per "Task-Focused" rule, showing only relevant scan context elements) -->
<!-- Since this is a focused scanning task, the global navigation is hidden to prioritize the camera view -->
</div>
<!-- Background Decoration / Glassmorphism Elements -->
<div class="fixed inset-0 pointer-events-none">
<!-- Top Shadow for readability -->
<div class="absolute top-0 w-full h-32 bg-gradient-to-b from-black/60 to-transparent"></div>
<!-- Bottom Shadow for readability -->
<div class="absolute bottom-0 w-full h-48 bg-gradient-to-t from-black/80 to-transparent"></div>
</div>
<!-- Success Feedback (Hidden by default, used for interaction state design) -->
<div class="hidden fixed inset-0 z-50 flex items-center justify-center p-container-padding bg-surface/90 backdrop-blur-md">
<div class="bg-surface-container rounded-2xl p-8 max-w-sm w-full text-center shadow-xl border border-outline-variant">
<div class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center mx-auto mb-6">
<span class="material-symbols-outlined text-on-primary-container text-[40px]" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="font-h1 text-h1 text-on-surface mb-2">인증 완료</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-8">성공적으로 행사에 체크인 되었습니다.</p>
<button class="w-full py-4 bg-primary text-white rounded-xl font-h2 text-h2 active:opacity-70 transition-opacity">
                확인
            </button>
</div>
</div>
</body></html>
