<!DOCTYPE html>

<html lang="ko"><head>

<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-nav {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>

<body class="bg-background text-on-background min-h-screen pb-10">
<!-- TopAppBar -->
<nav class="sticky top-0 z-50 bg-surface/90 backdrop-blur-md shadow-[0px_4px_20px_rgba(0,0,0,0.04)] flex items-center px-container-padding h-14 w-full">
<button class="material-symbols-outlined text-primary active:scale-95 transition-transform" data-icon="arrow_back">arrow_back</button>
</nav><header class="bg-surface px-container-padding pt-6 pb-2">
<h2 class="font-h1 text-h1 text-on-surface">KUIT</h2>
<p class="font-body-md text-body-md text-on-surface-variant/70 mt-1">멤버 124명</p>
</header>
<!-- Header Section (Community Context) -->
<!-- Tabs Section -->
<div class="sticky top-14 z-40 bg-surface flex border-b border-outline-variant/20 px-container-padding">
<button class="flex-1 py-4 text-center border-b-2 border-primary text-primary font-bold transition-all">
<span class="font-body-lg text-body-lg">공지</span>
</button>
<button class="flex-1 py-4 text-center text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="font-body-lg text-body-lg">행사</span>
</button>
<button class="flex-1 py-4 text-center text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="font-body-lg text-body-lg">멤버</span>
</button>
</div>
<!-- Content: Announcement Cards -->
<main class="px-container-padding pt-section-gap space-y-stack-gap">
<!-- Announcement Card 1 -->
<article class="bg-surface-container-lowest rounded-xl p-4 shadow-[0px_4px_20px_rgba(0,0,0,0.04)] border border-outline-variant/10 active:scale-[0.98] transition-transform">
<div class="flex items-center gap-3 mb-3">
<div>
<div class="flex items-center gap-1.5">
<span class="font-body-md text-body-md font-bold text-on-surface">정윤아</span>
<span class="px-2 py-0.5 bg-secondary-container/20 text-secondary text-[10px] font-bold rounded-full uppercase tracking-wider">운영진</span>
</div>
<p class="text-[11px] text-on-surface-variant/60">방금 전</p>
</div>
<button class="ml-auto material-symbols-outlined text-on-surface-variant text-body-lg" data-icon="more_horiz">more_horiz</button>
</div>
<h3 class="font-h2 text-h2 text-on-surface mb-2">KUIT 6기 데모데이🍀</h3>
<p class="font-body-md text-body-md text-on-surface-variant line-clamp-3 mb-4">
                안녕하세요! 드디어 기다리고 기다리던 6기 데모데이가 다가왔습니다. 우리들의 노력이 결실을 맺는 소중한 자리에 모두 함께해주세요.
            </p>
</article>
<!-- Announcement Card 2 -->
<article class="bg-surface-container-lowest rounded-xl p-4 shadow-[0px_4px_20px_rgba(0,0,0,0.04)] border border-outline-variant/10 active:scale-[0.98] transition-transform">
<div class="flex items-center gap-3 mb-3">
<div>
<div class="flex items-center gap-1.5">
<span class="font-body-md text-body-md font-bold text-on-surface">김민수</span>
<span class="px-2 py-0.5 bg-secondary-container/20 text-secondary text-[10px] font-bold rounded-full uppercase tracking-wider">운영진</span>
</div>
<p class="text-[11px] text-on-surface-variant/60">2시간 전</p>
</div>
<button class="ml-auto material-symbols-outlined text-on-surface-variant text-body-lg" data-icon="more_horiz">more_horiz</button>
</div>
<h3 class="font-h2 text-h2 text-on-surface mb-2">중간 회고 모임 공지</h3>
<p class="font-body-md text-body-md text-on-surface-variant">
                이번 프로젝트의 반환점을 돌아보며 서로의 진행 상황을 공유하고 피드백을 주고받는 시간을 가지려 합니다.
            </p>
</article>
</main>
<!-- FAB for New Post (Contextual for Notice Tab) -->
<button class="fixed right-6 w-14 h-14 bg-gradient-to-br from-primary to-secondary text-on-primary rounded-full shadow-lg flex items-center justify-center active:scale-90 transition-transform bottom-6">
<span class="material-symbols-outlined" data-icon="edit">edit</span>
</button>

</body></html>
