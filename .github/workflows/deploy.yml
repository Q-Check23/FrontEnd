name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Nginx
        run: |
          # 빌드 파일 배포 (/var/www/qcheck)
          sudo mkdir -p /var/www/qcheck
          sudo rm -rf /var/www/qcheck/*
          sudo cp -r dist/* /var/www/qcheck/
          
          # 권한 설정
          sudo chown -R www-data:www-data /var/www/qcheck
          sudo chmod -R 755 /var/www/qcheck

      - name: Reload Nginx
        run: sudo nginx -t && sudo systemctl reload nginx

      - name: Health check
        run: |
          sleep 2
          curl -f https://qcheck.asia/ || curl -f http://localhost/ || exit 1
          echo "Deployment successful!"
