name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Nginx
        run: |
          # Deploy build files (requires pre-configured directory permissions)
          rm -rf /var/www/qcheck/*
          cp -r dist/* /var/www/qcheck/

      - name: Reload Nginx
        run: sudo /bin/systemctl reload nginx

      - name: Health check
        run: |
          sleep 2
          curl -f https://qcheck.asia/ || curl -f http://localhost/ || exit 1
          echo "Deployment successful!"
